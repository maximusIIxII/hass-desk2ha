name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "custom_components/desk2ha/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"
  push:
    branches: [main]
    paths:
      - "custom_components/desk2ha/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check custom_components/desk2ha/ tests/
      - run: ruff format --check custom_components/desk2ha/ tests/

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest pytest-asyncio aiohttp
      - run: pytest tests/ -x --tb=short -v

  hassfest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
