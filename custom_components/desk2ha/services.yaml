fleet_status:
  name: Fleet Status
  description: Get status of all configured Desk2HA desks (online/offline, agent versions, collectors).

refresh:
  name: Refresh
  description: Force-refresh metrics from one or all desks.
  fields:
    device_key:
      name: Device Key
      description: Specific desk to refresh (leave empty for all desks).
      required: false
      example: "ST-ABC1234"
      selector:
        text:

restart_agent:
  name: Restart Agent
  description: Send a restart command to a remote Desk2HA agent.
  fields:
    device_key:
      name: Device Key
      description: Device key of the desk whose agent should be restarted.
      required: true
      example: "ST-ABC1234"
      selector:
        text:

fetch_product_images:
  name: Fetch Product Images
  description: Download product images from manufacturer websites for all configured desks. Images are cached locally.

wake_on_lan:
  name: Wake on LAN
  description: Send a Wake-on-LAN magic packet to wake a remote device.
  fields:
    device_key:
      name: Device Key
      description: Device key of the agent that should send the WoL packet.
      required: true
      example: "ST-ABC1234"
      selector:
        text:
    mac:
      name: MAC Address
      description: MAC address of the target device (e.g. AA:BB:CC:DD:EE:FF).
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:

device_health_check:
  name: Device Health Check
  description: >-
    Scan all Desk2HA devices for issues (missing manufacturer, generic names,
    stale/orphaned devices) and auto-fix what is possible. Fires a
    desk2ha_health_report event with the results.
  fields:
    auto_fix:
      name: Auto Fix
      description: Automatically fix issues that can be resolved (remove orphans, update names).
      required: false
      default: true
      selector:
        boolean:

compliance_check:
  name: Compliance Check
  description: >-
    Query fleet policy compliance status from all configured agents.
    Returns per-agent compliance status and any policy violations.
    Fires a desk2ha_compliance_report event with the results.

apply_policy:
  name: Apply Policy
  description: >-
    Store a fleet policy and push it to all (or targeted) agents.
    Policies are persisted and survive HA restarts.
    Fires a desk2ha_policy_applied event with the results.
  fields:
    policy_id:
      name: Policy ID
      description: Unique identifier for this policy.
      required: true
      example: "corp-display-standard"
      selector:
        text:
    kind:
      name: Policy Kind
      description: Type of policy (DisplayPolicy, AgentPolicy, SecurityPolicy, UpdatePolicy, PeripheralPolicy).
      required: true
      example: "DisplayPolicy"
      selector:
        select:
          options:
            - "DisplayPolicy"
            - "AgentPolicy"
            - "SecurityPolicy"
            - "UpdatePolicy"
            - "PeripheralPolicy"
    version:
      name: Version
      description: Policy version number.
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 999
    name:
      name: Policy Name
      description: Human-readable name for this policy.
      required: true
      example: "Corporate Display Standard"
      selector:
        text:
    rules:
      name: Rules
      description: >-
        Policy rules as key-value pairs. Range rules use {min, max, default},
        exact-value rules use a scalar or {value: x}.
      required: true
      example: '{"brightness_percent": {"min": 30, "max": 80, "default": 50}, "color_preset": "sRGB"}'
      selector:
        object:
    enforcement:
      name: Enforcement Mode
      description: How the policy is enforced (report_only, apply_on_connect, enforce_continuous, scheduled).
      required: false
      default: "report_only"
      selector:
        select:
          options:
            - "report_only"
            - "apply_on_connect"
            - "enforce_continuous"
            - "scheduled"
    targets:
      name: Targets
      description: List of device_keys to target. Leave empty to apply to all agents.
      required: false
      example: '["ST-ABC1234"]'
      selector:
        object:

bulk_config:
  name: Bulk Config
  description: >-
    Push config changes to all (or targeted) agents in a single operation.
    Each change specifies a TOML section, key, and value.
    Fires a desk2ha_bulk_config event with the results.
  fields:
    changes:
      name: Changes
      description: >-
        List of config changes. Each item has section, key, and value.
      required: true
      example: '[{"section": "collectors.intervals", "key": "ddcci", "value": 60}]'
      selector:
        object:
    targets:
      name: Targets
      description: List of device_keys to target. Leave empty to apply to all agents.
      required: false
      example: '["ST-ABC1234"]'
      selector:
        object:
